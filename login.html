<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energia - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="split-container">
        <div class="left-panel"></div>

        <div class="right-panel">
            <div class="login-box">
                <div class="logo"></div>
                
                <h1>ENERGIA</h1>
                <h2>Iniciar Sesión</h2>

                <form id="loginForm">
                    <div class="input-group">
                        <input type="email" id="correo" placeholder="Correo Electrónico" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="contrasena" placeholder="Contraseña" required>
                    </div>

                    <div class="links">
                        <a href="signup.html">¿No tienes una cuenta? Crea una</a>
                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>
                
            </div> 
        </div>
    </div>

    <div id="alert-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="alert-message">Mensaje de error aquí</h3>
            <div class="modal-buttons">
                <button id="btn-alert-ok" class="btn-modal btn-ok">Aceptar</button>
            </div>
        </div>
    </div>

    <script>
        // Lógica del Modal Personalizado
        const alertModal = document.getElementById('alert-modal');
        const alertMessage = document.getElementById('alert-message');
        const btnAlertOk = document.getElementById('btn-alert-ok');

        // Función para mostrar el modal
        function showCustomAlert(message) {
            alertMessage.textContent = message;
            alertModal.classList.remove('hidden');
        }

        // Evento para cerrar el modal
        btnAlertOk.addEventListener('click', () => {
            alertModal.classList.add('hidden');
        });

        // Lógica del Formulario
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                correo: document.getElementById('correo').value,
                contrasena: document.getElementById('contrasena').value
            };

            try {
                const response = await fetch('http://127.0.0.1:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // Guardamos los datos de sesión en el navegador
                    localStorage.setItem('userId', result.userId);
                    localStorage.setItem('nombreUsuario', result.nombre);
                    localStorage.setItem('userRol', result.rol);

                    // Redirección según rol
                    if (result.rol === 2) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    // Usamos el modal en lugar de alert()
                    showCustomAlert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Error de red:', error);
                showCustomAlert('No se pudo conectar con el servidor.');
            }
        });
    </script>
</body>
</html>
